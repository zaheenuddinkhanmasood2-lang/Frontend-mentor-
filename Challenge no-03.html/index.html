<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator UI</title>
    <link rel="stylesheet" href="style.css">
    <script src="Exercise-10.js"></script>
</head>

<body>
    <div class="calculator">
        <div class="boxes display">399,981</div>
        <div class="container">
            <div class="boxes buttons">
                <div class="button seven">7</div>
                <div class="button eight">8</div>
                <div class="button nine">9</div>
                <div class="button del">DEL</div>
                <div class="button four">4</div>
                <div class="button five">5</div>
                <div class="button six">6</div>
                <div class="button plus">+</div>
                <div class="button one">1</div>
                <div class="button two">2</div>
                <div class="button three">3</div>
                <div class="button minus">-</div>
                <div class="button dot">.</div>
                <div class="button zero">0</div>
                <div class="button slash">/</div>
                <div class="button multiply">*</div>
            </div>
            <div class="bottom">
                <div class="ctrl del flex">RESET</div>
                <div class="ctrl del equal flex">=</div>
            </div>
        </div>

    </div>
</body>

</html>
