<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce Website main Product Card</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .links {
            text-decoration: none;
        }
    </style>
</head>

<body>
    <header>
        <div class="header">
            <nav class="header_left nav">
                <div class="logo name">
                    sneakers
                </div>
                <div class="links">
                    <a href="" class="links collections headersmalleritoms">Collections</a>
                    <a href="" class="links collections headersmalleritoms">Men</a>
                    <a href="" class="links collections headersmalleritoms">Women</a>
                    <a href="" class="links collections headersmalleritoms">About</a>
                    <a href="" class="links collections headersmalleritoms">Contact</a>
                </div>
            </nav>
            <div class="header_right shop_icon_profilepic">
                <div class="shopicon headersmalleritoms">
                    <img src="Assets/tray.png" alt="">
                </div>
                <div class="face headersmalleritoms">
                    <img src="Assets/face_pic.png" alt="">
                </div>
            </div>
        </div>
    </header>
    <div class="separation"></div>
    <section class="main_productsection">
        <div class="product-pics-section">

            <div class="image">
                <img src="Assets/product pic.png" alt="product main image">
            </div>
            <div class="related-images-box">
                <img class="related_images " src="Assets/product_small_1.png" alt="">
                <img class="related_images " src="Assets/product_small_02.png" alt="">
                <img class="related_images " src="Assets/product_small_03.png" alt="">
                <img class="related_images " src="Assets/product_small_04.png" alt="">
            </div>
        </div>

        <div class="about">
            <div class="comapny_name" style="color: #888c8d;">SNEAKER COMPANY</div>
            <div class="product_title">
                Fall Limited Edition Sneakers
            </div>
            <div class="product_description" style="color: #727575;">
                These low-profile sneakers are your pefect casual wear companion.
                Featuring a durable rubber outer sole.
                They'll withstand everything the weather can offer.
            </div>
            <div class="actual-price-box">
                <div class="price product_title">$125.00</div>
                <div class="discount_age">50%</div>
            </div>
            <div class="original-price">$250.00</div>
            <div class="cart-section flex">
                <div class="how-many flex">
                    <div class="minus" >-</div>
                    <div class="number">0</div>
                    <div class="plus" >+</div>
                </div>
                <div class="add-to-cart-button flex">
                    <img src="Assets/tray.png" alt="the tray icon">
                    <div class="add-to-cart">Add to cart</div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
